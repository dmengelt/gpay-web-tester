<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Pay API for Web - Shipping Options Not Provided</title>
</head>

<body>
    <p>Demo merchant checkout page with a Google Pay button (Shipping Options Not Provided by the Merchant)</p>
    <div id="gpay-container"></div>    
    <hr/>
    <div id="user-agent"></div>
    <hr/>
    <h3>Result:</h3>
    <pre id="result"></pre>
    <script async src="https://pay.google.com/gp/p/js/pay.js" onload="onGooglePayLoaded()"></script>
    <script type="text/javascript">
        const GPAY_BUTTON_CONTAINER_ID = 'gpay-container';

        const merchantInfo = {
            merchantId: '12345678901234567890',
            merchantName: 'Example Merchant',
        };

        const baseGooglePayRequest = {
            apiVersion: 2,
            apiVersionMinor: 0,
            allowedPaymentMethods: [
                {
                    type: 'CARD',
                    parameters: {
                        allowedAuthMethods: ['PAN_ONLY', 'CRYPTOGRAM_3DS'],
                        allowedCardNetworks: ['AMEX', 'DISCOVER', 'INTERAC', 'JCB', 'MASTERCARD', 'VISA'],
                    },
                    tokenizationSpecification: {
                        type: 'PAYMENT_GATEWAY',
                        parameters: {
                            gateway: 'example',
                            gatewayMerchantId: 'exampleGatewayMerchantId',
                        },
                    },
                },
            ],
            merchantInfo,
        };

        Object.freeze(baseGooglePayRequest);

        let paymentsClient = null;

        function getGooglePaymentsClient() {           
            if (paymentsClient === null) {                
                paymentsClient = new google.payments.api.PaymentsClient({                 
                    environment: 'TEST',                  
                    merchantInfo,
                    paymentDataCallbacks: {
                        onPaymentDataChanged: onPaymentDataChanged
                    }
                });
            }

            return paymentsClient;
        }

        const deepCopy = obj => JSON.parse(JSON.stringify(obj));

        function renderGooglePayButton() {            
            const button = getGooglePaymentsClient().createButton({             
                onClick: onGooglePaymentButtonClicked,
            });            
            document.getElementById(GPAY_BUTTON_CONTAINER_ID).appendChild(button);
        }

        function onGooglePayLoaded() {

            document.getElementById('user-agent').innerHTML= window.navigator.userAgent;

            const req = deepCopy(baseGooglePayRequest);
            getGooglePaymentsClient()
                .isReadyToPay(req)
                .then(function (res) {
                    if (res.result) {
                        renderGooglePayButton();
                    } else {
                        //console.log('Google Pay is not ready for this user.');
                        renderGooglePayButton();
                    }
                })
                .catch(console.error);
        }

        function onGooglePaymentButtonClicked() {
            const req = {
                ...deepCopy(baseGooglePayRequest),
                callbackIntents: ['SHIPPING_ADDRESS', 'SHIPPING_OPTION'],
                shippingAddressRequired: true,
                shippingOptionRequired: true,
                transactionInfo: {
                    countryCode: 'US',
                    currencyCode: 'USD',
                    totalPriceStatus: 'FINAL',
                    totalPrice: (Math.random() * 999 + 1).toFixed(2),
                },
            };

            console.log('onGooglePaymentButtonClicked', req);

            getGooglePaymentsClient()
                .loadPaymentData(req)
                .then(function (res) {
                    console.log(res);
                    if (document.getElementById('result')) {
                        document.getElementById('result').innerHTML = JSON.stringify(res, null, 2);
                    }
                    paymentToken = res.paymentMethodData.tokenizationData.token;
                })
                .catch(function (err) {
                    console.error("loadPaymentData catch error", err);
                    if (document.getElementById('result')) {
                        document.getElementById('result').innerHTML = JSON.stringify(err, Object.getOwnPropertyNames(err), 2);
                    }
                });
        }

        function onPaymentDataChanged(intermediatePaymentData) {
            console.log('onPaymentDataChanged callback triggered', intermediatePaymentData);
            return new Promise(function(resolve, reject) {
                let paymentDataRequestUpdate = {};

                /*
                if (intermediatePaymentData.callbackTrigger === 'INITIALIZE' ||
                    intermediatePaymentData.callbackTrigger === 'SHIPPING_ADDRESS') {
                    
                    if (intermediatePaymentData.shippingAddress && intermediatePaymentData.shippingAddress.countryCode === 'US') {
                        paymentDataRequestUpdate.newShippingOptionParameters = {
                            defaultSelectedOptionId: 'shipping-001',
                            shippingOptions: [
                                {
                                    id: 'shipping-001',
                                    label: 'Free shipping',
                                    description: 'Free Shipping delivered in 5 business days.'
                                },
                                {
                                    id: 'shipping-002',
                                    label: 'Express shipping',
                                    description: 'Express Shipping delivered in 1-2 business days.'
                                }
                            ]
                        };
                    } else {
                        paymentDataRequestUpdate.error = {
                            reason: 'SHIPPING_ADDRESS_UNSERVICEABLE',
                            message: 'We cannot ship to this address.',
                            intent: 'SHIPPING_ADDRESS'
                        };
                    }
                }
                */

                resolve(paymentDataRequestUpdate);
            });
        }

    </script>
</body>
</html>
