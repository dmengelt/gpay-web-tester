<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Pay API for Web - DPU Shipping Options Delay</title>
</head>

<body>
    <p>Demo merchant checkout page with a Google Pay button - DPU Shipping Options Delay Reproducer</p>
    <div id="gpay-container"></div>    
    <hr/>
    <div id="user-agent"></div>
    <div id="result"></div>
    <script async src="https://pay.google.com/gp/p/js/pay.js" onload="onGooglePayLoaded()"></script>
    <script type="text/javascript">
        const GPAY_BUTTON_CONTAINER_ID = 'gpay-container';

        const merchantInfo = {
            merchantId: '12345678901234567890',
            merchantName: 'Example Merchant',
        };

        const baseGooglePayRequest = {
            apiVersion: 2,
            apiVersionMinor: 0,
            allowedPaymentMethods: [
                {
                    type: 'CARD',
                    parameters: {
                        allowedAuthMethods: ['PAN_ONLY', 'CRYPTOGRAM_3DS'],
                        allowedCardNetworks: ['AMEX', 'DISCOVER', 'INTERAC', 'JCB', 'MASTERCARD', 'VISA'],
                    },
                    tokenizationSpecification: {
                        type: 'PAYMENT_GATEWAY',
                        parameters: {
                            gateway: 'example',
                            gatewayMerchantId: 'exampleGatewayMerchantId',
                        },
                    },
                },
            ],
            merchantInfo,
        };

        Object.freeze(baseGooglePayRequest);

        let paymentsClient = null;

        function getGooglePaymentsClient() {           
            if (paymentsClient === null) {                
                paymentsClient = new google.payments.api.PaymentsClient({                 
                    environment: 'TEST',                  
                    merchantInfo,
                    paymentDataCallbacks: {
                        onPaymentAuthorized: onPaymentAuthorizedCallbackHandler,
                        onPaymentDataChanged: onPaymentDataChanged
                    }
                });
            }

            return paymentsClient;
        }

        const deepCopy = obj => JSON.parse(JSON.stringify(obj));

        function renderGooglePayButton() {            
            const button = getGooglePaymentsClient().createButton({             
                onClick: onGooglePaymentButtonClicked,
            });            
            document.getElementById(GPAY_BUTTON_CONTAINER_ID).appendChild(button);
        }

        function onGooglePayLoaded() {

            document.getElementById('user-agent').innerHTML= window.navigator.userAgent;

            const req = deepCopy(baseGooglePayRequest);
            getGooglePaymentsClient()
                .isReadyToPay(req)
                .then(function (res) {
                    if (res.result) {
                        renderGooglePayButton();
                    } else {
                        //console.log('Google Pay is not ready for this user.');
                        renderGooglePayButton();
                    }
                })
                .catch(console.error);
        }

        function onGooglePaymentButtonClicked() {
            const req = {
                ...deepCopy(baseGooglePayRequest),
                callbackIntents: ['PAYMENT_AUTHORIZATION', 'SHIPPING_ADDRESS', 'SHIPPING_OPTION'],
                shippingAddressRequired: true,
                shippingOptionRequired: true,
                transactionInfo: {
                    countryCode: 'US',
                    currencyCode: 'USD',
                    totalPriceStatus: 'FINAL',
                    totalPrice: '1.00',
                    totalPriceLabel: 'Total',
                    displayItems: [
                        {
                            label: 'Subtotal',
                            type: 'SUBTOTAL',
                            price: '1.00'
                        }
                    ]
                },
            };

            console.log('onGooglePaymentButtonClicked', req);

            getGooglePaymentsClient()
                .loadPaymentData(req)
                .then(function (res) {
                    console.log("loadPaymentData success resolved", res);
                    if (document.getElementById('result')) {
                        document.getElementById('result').innerHTML = JSON.stringify(res, null, 2);
                    }
                })
                .catch(function (err) {
                    console.error("loadPaymentData catch error", err);
                    if (document.getElementById('result')) {
                        document.getElementById('result').innerHTML = JSON.stringify(err, Object.getOwnPropertyNames(err), 2);
                    }
                });
        }

        function onPaymentAuthorizedCallbackHandler(paymentData) {
            return new Promise(function(resolve, reject){
                // handle the response
                processPayment(paymentData)
                .then(function() {
                    setTimeout(function() {        
                        console.log("resolving the success promise in onPaymentAuthorizedCallbackHandler")
                        resolve({transactionState: 'SUCCESS'});
                    }, 1000);
                })
                .catch(function() {
                    resolve({
                        transactionState: 'ERROR',
                        error: {
                            intent: 'PAYMENT_AUTHORIZATION',
                            message: 'Insufficient funds',
                            reason: 'PAYMENT_DATA_INVALID'
                        }
                    });
                });
            });
        }

        function onPaymentDataChanged(intermediatePaymentData) {  
            console.log(JSON.stringify(intermediatePaymentData));
            return new Promise(function(resolve, reject) {   
                let paymentDataRequestUpdate = {};
                if (intermediatePaymentData.callbackTrigger === 'INITIALIZE') {
                    paymentDataRequestUpdate = {
                        newShippingOptionParameters: {
                            defaultSelectedOptionId: "shipping-001",
                            shippingOptions: [
                                {         
                                    "id": "shipping-001",
                                    "label": "Free worldwide shipping",
                                    "description": "Free Shipping delivered in 5 business days."
                                },
                                {         
                                    "id": "shipping-002",
                                    "label": "Fast worldwide shipping",
                                    "description": "Fast Shipping delivered in 1-2 business days."
                                }
                            ]
                        }
                    };
                    setTimeout(function() {
                        console.log("Resolving INITIALIZE trigger after 12s delay");
                        resolve(paymentDataRequestUpdate);
                    }, 25000);
                } else {
                    resolve(paymentDataRequestUpdate);
                }
            });
        }

        function processPayment(paymentData) {
            return new Promise(function(resolve, reject) {
                setTimeout(function() {
                    let paymentToken = paymentData.paymentMethodData.tokenizationData.token;
                    document.getElementById('result').innerHTML = JSON.stringify(paymentData, null, 2);
                    console.log("loadPaymentData success (triggered over onPaymentAuthorized callback)");     
                    resolve({});
                }, 1000);
            });
        }

    </script>
</body>
</html>
