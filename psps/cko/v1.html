<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Pay API for Web - CKO v1</title>
</head>

<body>
    <p>Google Pay API apiVersion=1 merchant checkout page with a Google Pay button</p>
    <div id="gpay-container"></div>    
    <hr/>
    <div id="user-agent"></div>
    <pre id="log"></pre>
    <script async src="https://pay.google.com/gp/p/js/pay.js" onload="onGooglePayLoaded()"></script>
    <script type="text/javascript">
        const GPAY_BUTTON_CONTAINER_ID = 'gpay-container';

        const v1GooglePayRequest = {
          "merchantId": "01234567890123456789",
          "paymentMethodTokenizationParameters": {
            "tokenizationType": "PAYMENT_GATEWAY",
            "parameters": {
              "gateway": "checkoutltd",
              "gatewayMerchantId": "exampleGatewayMerchantId"
            }
          },
          "allowedPaymentMethods": [
            "CARD",
            "TOKENIZED_CARD"
          ],
          "cardRequirements": {
            "billingAddressRequired": true,
            "billingAddressFormat": 'FULL',
            "allowedCardNetworks": [
              "VISA",
              "MASTERCARD",
              "AMEX",
              "JCB",
              "DISCOVER"
            ]
          },
          "transactionInfo": {
            "currencyCode": "USD",
            "totalPriceStatus": "FINAL",
            "totalPrice": "1.25"
          },       
          "apiVersion": 1,
          "environment": "TEST"
        };

        Object.freeze(v1GooglePayRequest);

        let paymentsClient = null;

        function getGooglePaymentsClient() {           
            if (paymentsClient === null) {                
                paymentsClient = new google.payments.api.PaymentsClient({                 
                    environment: 'TEST',
                });
            }

            return paymentsClient;
        }

        const deepCopy = obj => JSON.parse(JSON.stringify(obj));

        function renderGooglePayButton() {            
            const button = getGooglePaymentsClient().createButton({             
                onClick: onGooglePaymentButtonClicked,
            });            
            document.getElementById(GPAY_BUTTON_CONTAINER_ID).appendChild(button);
        }

        function onGooglePayLoaded() {
            document.getElementById('user-agent').innerHTML= window.navigator.userAgent;

            const req = deepCopy(v1GooglePayRequest);
            getGooglePaymentsClient()
                .isReadyToPay(req)
                .then(function (res) {
                    //document.getElementById('log').innerHTML = JSON.stringify(res, null, 2);
                    if (res.result) {
                        renderGooglePayButton();
                    } else {
                        renderGooglePayButton();
                    }
                })
                .catch(console.error);
        }

        function onGooglePaymentButtonClicked() {
            const req = deepCopy(v1GooglePayRequest);

            console.log('onGooglePaymentButtonClicked', req);

            getGooglePaymentsClient()
                .loadPaymentData(req)
                .then(function (res) {
                    console.log(res);
                    document.getElementById('log').innerHTML = JSON.stringify(res, null, 2);
                })
                .catch(function (err) {
                    console.error(err);
                    document.getElementById('log').innerHTML = JSON.stringify(err, null, 2);
                });
        }

    </script>
</body>
</html>
